repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy -D warnings
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

  # knots complexity gate. The default `knots` hook ships args
  # [--aird-threshold=85], so no override is needed here. To tighten or add
  # metrics, set `args:` (pre-commit replaces them wholesale), e.g.
  #   args: [--aird-threshold=85, --cognitive-threshold=20]
  - repo: https://github.com/brandon-arrendondo/knots
    rev: v1.10.0
    hooks:
      - id: knots
