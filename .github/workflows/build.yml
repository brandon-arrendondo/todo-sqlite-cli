name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: todo-sqlite-cli-linux-x64
            binary: target/release/todo-sqlite-cli
          - os: windows-2022
            artifact_name: todo-sqlite-cli-windows-x64
            binary: target/release/todo-sqlite-cli.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Security Audit - Check Dependencies
        run: |
          cargo install cargo-audit
          cargo audit
        continue-on-error: true

      - name: Build Release Binary
        run: cargo build --release

      - name: Run Tests
        run: cargo test --release
        continue-on-error: true

      - name: Verify Binary
        run: ${{ matrix.binary }} --version

      - name: Install cargo-about
        run: cargo install cargo-about --features cli

      - name: Generate Third-Party Licenses
        run: cargo about generate about.hbs -o THIRD_PARTY_LICENSES.txt

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx

      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --format json --spec-version 1.5

      - name: Stage Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARTIFACT_DIR="artifacts/${{ matrix.artifact_name }}-${VERSION}"
          mkdir -p "${ARTIFACT_DIR}/man"
          cp ${{ matrix.binary }} "${ARTIFACT_DIR}/"
          cp README.md "${ARTIFACT_DIR}/"
          cp LICENSE "${ARTIFACT_DIR}/"
          cp THIRD_PARTY_LICENSES.txt "${ARTIFACT_DIR}/"
          cp todo-sqlite-cli.cdx.json "${ARTIFACT_DIR}/"
          cp man/todo-sqlite-cli.1 "${ARTIFACT_DIR}/man/"
          echo "=== Artifacts staged ==="
          ls -lhR "${ARTIFACT_DIR}/"
          echo "ARTIFACT_DIR=${ARTIFACT_DIR}" >> $GITHUB_ENV

      - name: Stage Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $ARTIFACT_DIR = "artifacts/${{ matrix.artifact_name }}-${VERSION}"
          New-Item -ItemType Directory -Force -Path $ARTIFACT_DIR
          Copy-Item "${{ matrix.binary }}" -Destination $ARTIFACT_DIR
          Copy-Item "README.md" -Destination $ARTIFACT_DIR
          Copy-Item "LICENSE" -Destination $ARTIFACT_DIR
          Copy-Item "THIRD_PARTY_LICENSES.txt" -Destination $ARTIFACT_DIR
          Copy-Item "todo-sqlite-cli.cdx.json" -Destination $ARTIFACT_DIR
          Write-Host "=== Artifacts staged ==="
          Get-ChildItem $ARTIFACT_DIR
          echo "ARTIFACT_DIR=${ARTIFACT_DIR}" >> $env:GITHUB_ENV

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.version.outputs.VERSION }}
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 30

  package:
    name: Package Release
    needs: build
    runs-on: ubuntu-22.04
    if: >-
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libfuse2

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: todo-sqlite-cli-linux-x64-${{ steps.version.outputs.VERSION }}
          path: artifacts/todo-sqlite-cli-linux-x64-${{ steps.version.outputs.VERSION }}

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: todo-sqlite-cli-windows-x64-${{ steps.version.outputs.VERSION }}
          path: artifacts/todo-sqlite-cli-windows-x64-${{ steps.version.outputs.VERSION }}

      - name: Restore binary execute bit
        run: chmod +x artifacts/todo-sqlite-cli-linux-x64-${{ steps.version.outputs.VERSION }}/todo-sqlite-cli

      - name: Create Release Archive (Linux)
        run: |
          cd artifacts
          tar -czf todo-sqlite-cli-linux-x64-${{ steps.version.outputs.VERSION }}.tar.gz todo-sqlite-cli-linux-x64-${{ steps.version.outputs.VERSION }}

      - name: Create Release Archive (Windows)
        run: |
          cd artifacts
          zip -r todo-sqlite-cli-windows-x64-${{ steps.version.outputs.VERSION }}.zip todo-sqlite-cli-windows-x64-${{ steps.version.outputs.VERSION }}

      - name: Build deb package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_DIR="todo-sqlite-cli_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/man/man1"
          mkdir -p "${PKG_DIR}/usr/share/doc/todo-sqlite-cli"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: todo-sqlite-cli
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Brandon Arrendondo <brandon@arrendondo.dev>
          Homepage: https://github.com/brandonarrendondo/todo-sqlite-cli
          Description: Per-project TODO list CLI backed by SQLite
           A scriptable per-project TODO list backed by SQLite, designed for
           coding agents (Claude Code and friends) but equally usable as a
           plain CLI. Supports tags, dependencies, priorities, JSON output,
           and multi-repo workflows via a .todo-sqlite-cli marker.
          EOF
          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"

          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/todo-sqlite-cli" "${PKG_DIR}/usr/bin/"
          chmod 755 "${PKG_DIR}/usr/bin/todo-sqlite-cli"
          gzip -c man/todo-sqlite-cli.1 > "${PKG_DIR}/usr/share/man/man1/todo-sqlite-cli.1.gz"
          cp README.md "${PKG_DIR}/usr/share/doc/todo-sqlite-cli/"
          cp LICENSE "${PKG_DIR}/usr/share/doc/todo-sqlite-cli/copyright"
          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/THIRD_PARTY_LICENSES.txt" \
             "${PKG_DIR}/usr/share/doc/todo-sqlite-cli/"
          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/todo-sqlite-cli.cdx.json" \
             "${PKG_DIR}/usr/share/doc/todo-sqlite-cli/"

          dpkg-deb --build --root-owner-group "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "artifacts/"
          dpkg-deb --info "artifacts/${PKG_DIR}.deb"

      - name: Build rpm package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          TARDIR="todo-sqlite-cli-${VERSION}"
          mkdir -p "${TARDIR}/bin" "${TARDIR}/man" "${TARDIR}/doc"
          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/todo-sqlite-cli" "${TARDIR}/bin/"
          cp man/todo-sqlite-cli.1 "${TARDIR}/man/"
          cp README.md "${TARDIR}/doc/"
          cp LICENSE "${TARDIR}/doc/"
          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/THIRD_PARTY_LICENSES.txt" "${TARDIR}/doc/"
          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/todo-sqlite-cli.cdx.json" "${TARDIR}/doc/"
          tar -czf "rpmbuild/SOURCES/todo-sqlite-cli-${VERSION}.tar.gz" "${TARDIR}"
          rm -rf "${TARDIR}"

          cat > rpmbuild/SPECS/todo-sqlite-cli.spec << 'SPEC_EOF'
          Name:           todo-sqlite-cli
          Version:        VERSION_PLACEHOLDER
          Release:        1%{?dist}
          Summary:        Per-project TODO list CLI backed by SQLite
          License:        MIT
          URL:            https://github.com/brandonarrendondo/todo-sqlite-cli
          Source0:        %{name}-%{version}.tar.gz

          %description
          A scriptable per-project TODO list backed by SQLite, designed for
          coding agents but equally usable as a plain CLI. Supports tags,
          dependencies, priorities, JSON output, and multi-repo workflows.

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}%{_bindir}
          mkdir -p %{buildroot}%{_mandir}/man1
          mkdir -p %{buildroot}%{_docdir}/%{name}
          install -m 755 bin/todo-sqlite-cli %{buildroot}%{_bindir}/todo-sqlite-cli
          install -m 644 man/todo-sqlite-cli.1 %{buildroot}%{_mandir}/man1/todo-sqlite-cli.1
          install -m 644 doc/README.md %{buildroot}%{_docdir}/%{name}/README.md
          install -m 644 doc/LICENSE %{buildroot}%{_docdir}/%{name}/LICENSE
          install -m 644 doc/THIRD_PARTY_LICENSES.txt %{buildroot}%{_docdir}/%{name}/THIRD_PARTY_LICENSES.txt
          install -m 644 doc/todo-sqlite-cli.cdx.json %{buildroot}%{_docdir}/%{name}/todo-sqlite-cli.cdx.json

          %files
          %{_bindir}/todo-sqlite-cli
          %{_mandir}/man1/todo-sqlite-cli.1*
          %doc %{_docdir}/%{name}/README.md
          %doc %{_docdir}/%{name}/THIRD_PARTY_LICENSES.txt
          %doc %{_docdir}/%{name}/todo-sqlite-cli.cdx.json
          %license %{_docdir}/%{name}/LICENSE
          SPEC_EOF

          sed -i 's/^          //' rpmbuild/SPECS/todo-sqlite-cli.spec
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" rpmbuild/SPECS/todo-sqlite-cli.spec

          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/todo-sqlite-cli.spec
          cp rpmbuild/RPMS/x86_64/todo-sqlite-cli-*.rpm artifacts/
          rpm -qip artifacts/todo-sqlite-cli-*.rpm

      - name: Build AppImage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          curl -Lo appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          APPDIR="todo-sqlite-cli.AppDir"
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/man/man1"
          mkdir -p "${APPDIR}/usr/share/doc/todo-sqlite-cli"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/todo-sqlite-cli" "${APPDIR}/usr/bin/"
          chmod 755 "${APPDIR}/usr/bin/todo-sqlite-cli"
          cp man/todo-sqlite-cli.1 "${APPDIR}/usr/share/man/man1/"
          cp README.md "${APPDIR}/usr/share/doc/todo-sqlite-cli/"
          cp LICENSE "${APPDIR}/usr/share/doc/todo-sqlite-cli/"
          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/THIRD_PARTY_LICENSES.txt" \
             "${APPDIR}/usr/share/doc/todo-sqlite-cli/"
          cp "artifacts/todo-sqlite-cli-linux-x64-${VERSION}/todo-sqlite-cli.cdx.json" \
             "${APPDIR}/usr/share/doc/todo-sqlite-cli/"

          cat > "${APPDIR}/todo-sqlite-cli.desktop" << EOF
          [Desktop Entry]
          Type=Application
          Name=todo-sqlite-cli
          Exec=todo-sqlite-cli
          Icon=todo-sqlite-cli
          Comment=Per-project TODO list CLI backed by SQLite
          Categories=Development;Utility;
          Terminal=true
          NoDisplay=true
          EOF
          sed -i 's/^          //' "${APPDIR}/todo-sqlite-cli.desktop"

          cat > "${APPDIR}/todo-sqlite-cli.svg" << 'SVG_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
            <rect width="256" height="256" rx="32" fill="#1a202c"/>
            <text x="128" y="168" font-family="monospace" font-size="140" font-weight="bold" fill="#68d391" text-anchor="middle">✓</text>
          </svg>
          SVG_EOF
          sed -i 's/^          //' "${APPDIR}/todo-sqlite-cli.svg"
          cp "${APPDIR}/todo-sqlite-cli.svg" "${APPDIR}/usr/share/icons/hicolor/256x256/apps/"

          cat > "${APPDIR}/AppRun" << 'APPRUN_EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export PATH="${HERE}/usr/bin:${PATH}"
          export MANPATH="${HERE}/usr/share/man:${MANPATH}"
          exec "${HERE}/usr/bin/todo-sqlite-cli" "$@"
          APPRUN_EOF
          chmod +x "${APPDIR}/AppRun"

          ARCH=x86_64 ./appimagetool "${APPDIR}" "artifacts/todo-sqlite-cli-${VERSION}-x86_64.AppImage"
          ls -lh "artifacts/todo-sqlite-cli-${VERSION}-x86_64.AppImage"

      - name: Upload Release Archives
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ steps.version.outputs.VERSION }}
          path: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
